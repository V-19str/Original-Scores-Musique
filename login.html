* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0a;

  min-height: 100vh;

  align-items: center;

.logo { display: flex; align-items: center; gap: 12px; }

  border-radius: 8px;
  padding: 40px;

  padding: 12px;

  font-weight: 700;
  letter-spacing: 2px;
  border-radius: 4px;
  text-transform: uppercase;
  text-decoration: none;
  transition: background 0.15s;
}
a.btn:hover { background: #c4070f; }
.back { font-size: 11px; color: #666; margin-top: 16px; }
.back a { color: #888; text-decoration: none; }
.back a:hover { color: #fff; }
