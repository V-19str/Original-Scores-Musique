<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSM – Connexion</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0a0a0a;
  color: #fff;
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 32px;
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-mark { background: #E50914; color: #fff; font-size: 14px; font-weight: 700; letter-spacing: 2px; padding: 6px 10px; border-radius: 3px; }
.logo-name { font-size: 16px; font-weight: 600; letter-spacing: 3px; }
.box {
  background: #1f1f1f;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 40px;
  width: 360px;
  text-align: center;
}
.box-title { font-size: 13px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 6px; }
.box-sub { font-size: 12px; color: #888; margin-bottom: 28px; }
input {
  width: 100%;
  background: #2a2a2a;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 4px;
  padding: 12px 16px;
  color: #fff;
  font-family: 'Montserrat', sans-serif;
  font-size: 14px;
  text-align: center;
  letter-spacing: 4px;
  outline: none;
  margin-bottom: 14px;
  transition: border-color 0.2s;
}
input:focus { border-color: #E50914; }
button {
  width: 100%;
  background: #E50914;
  color: #fff;
  border: none;
  padding: 12px;
  font-family: 'Montserrat', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  cursor: pointer;
  border-radius: 4px;
  text-transform: uppercase;
  transition: background 0.15s;
}
button:hover { background: #c4070f; }
.error { font-size: 11px; color: #E50914; margin-top: 10px; display: none; }
.back { font-size: 11px; color: #666; margin-top: 16px; }
.back a { color: #888; text-decoration: none; }
.back a:hover { color: #fff; }
</style>
</head>
<body>

<div class="logo">
  <div class="logo-mark">OSM</div>
  <div class="logo-name">ORIGINAL SCORES MUSIC</div>
</div>

<div class="box">
  <div class="box-title">Connexion</div>
  <div class="box-sub">Entrez votre mot de passe d'accès</div>
  <input type="password" id="pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
  <button onclick="login()">Accéder au catalogue</button>
  <div class="error" id="error">Mot de passe incorrect</div>
  <div class="back">
    Pas encore d'accès ? <a href="inscription.html">Faire une demande</a>
  </div>
</div>

<script>
function login() {
  if (document.getElementById('pw').value === 'osm2026') {
    sessionStorage.setItem('osm_ok', '1');
    window.location.href = 'index.html';
  } else {
    document.getElementById('error').style.display = 'block';
  }
}
</script>
</body>
</html>
