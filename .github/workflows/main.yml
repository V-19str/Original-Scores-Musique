name: Generate Catalogue

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Cloudinary catalogue
        run: |
          python3 << 'EOF'
          import requests, json
          from requests.auth import HTTPBasicAuth

          CLOUD_NAME = "dqfogw7sg"
          API_KEY    = "975546688173615"
          API_SECRET = "Bgs1ukB5izJ9ilIxgIbt55F9eng"

          all_resources = []
          next_cursor = None
          page = 1

          while True:
              params = {
                  "resource_type": "video",
                  "type": "upload",
                  "max_results": 500,
                  "tags": True,
                  "context": True,
                  "prefix": "ORIGINAL SCORES MUSIC - COLLECTIONS - LQ MP3/"
              }
              if next_cursor:
                  params["next_cursor"] = next_cursor
              r = requests.get(
                  f"https://api.cloudinary.com/v1_1/{CLOUD_NAME}/resources/video",
                  params=params,
                  auth=HTTPBasicAuth(API_KEY, API_SECRET)
              )
              data = r.json()
              resources = data.get("resources", [])
              all_resources.extend(resources)
              print(f"Page {page} : {len(resources)} morceaux (total : {len(all_resources)})")
              next_cursor = data.get("next_cursor")
              page += 1
              if not next_cursor:
                  break

          tracks = []
          playlists = {}
          for r in all_resources:
              public_id = r.get("public_id", "")
              url       = r.get("secure_url", "")
              duration  = round(r.get("duration", 0))
              parts     = public_id.split("/")
              # Structure: ORIGINAL SCORES MUSIC.../PLAYLIST/fichier
              playlist  = parts[-2] if len(parts) >= 3 else (parts[-2] if len(parts) >= 2 else "Divers")
              filename  = parts[-1]
              title     = filename.replace("-", " ").replace("_", " ").title()
              # Nettoyer le code Cloudinary à la fin (ex: _eqzr9z)
              import re
              title = re.sub(r'\s+[A-Za-z0-9]{6}$', '', title).strip()
              mins, secs = divmod(duration, 60)
              tracks.append({
                  "id": public_id,
                  "title": title,
                  "playlist": playlist,
                  "duration": f"{mins}:{secs:02d}",
                  "url": url,
                  "tags": r.get("tags", [])
              })
              playlists[playlist] = playlists.get(playlist, 0) + 1

          tracks.sort(key=lambda t: (t["playlist"], t["title"]))
          output = {"total": len(tracks), "playlists": sorted(playlists.keys()), "tracks": tracks}
          with open("catalogue.json", "w", encoding="utf-8") as f:
              json.dump(output, f, ensure_ascii=False, indent=2)
          print(f"✅ {len(tracks)} morceaux, {len(playlists)} playlists")
          for p, c in sorted(playlists.items()):
              print(f"  {p}: {c}")
          EOF

      - name: Commit catalogue.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add catalogue.json
          git commit -m "Update catalogue.json" || echo "Rien à commiter"
          git push
