name: Generate Catalogue

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch Cloudinary catalogue
        run: python3 fetch_catalogue.py

      - name: Commit catalogue.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add catalogue.json
          git commit -m "Update catalogue.json" || echo "Rien à commiter"
          git push
