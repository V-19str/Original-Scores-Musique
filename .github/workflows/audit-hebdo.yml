name: Audit hebdomadaire du site

on:
  schedule:
    # Lundi 06:00 UTC ≈ 08:00 Paris en été (CEST) / 07:00 en hiver (CET).
    # GitHub Actions planifie en UTC et ne gère pas le changement d'heure.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

jobs:
  audit:
    name: Audit intégrité + disponibilité
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lancer l'audit du site
        # Le script sort en code 1 si un problème est détecté,
        # ce qui fait échouer cette étape et donc le workflow.
        run: python scripts/audit_site.py --workers 16
