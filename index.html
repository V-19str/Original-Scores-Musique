<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSM – Original Scores Music</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Cinzel:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --gold-dim: rgba(201,168,76,0.15);
  --bg: #0a0a0a;
  --bg2: #111;
  --bg3: #181818;
  --text: #e8e0d0;
  --muted: #666;
  --border: rgba(201,168,76,0.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }
header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 40px; height: 70px; display: flex; align-items: center; justify-content: space-between; }
.logo { display: flex; flex-direction: column; line-height: 1; }
.logo-name { font-family: 'Cinzel', serif; font-size: 14px; font-weight: 600; letter-spacing: 4px; color: var(--gold); }
.logo-sub { font-size: 9px; letter-spacing: 5px; color: var(--muted); margin-top: 3px; text-transform: uppercase; }
.search-wrap { position: relative; flex: 1; max-width: 400px; margin: 0 40px; }
.search-wrap input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 2px; padding: 8px 16px 8px 36px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 300; letter-spacing: 1px; outline: none; transition: border-color 0.2s; }
.search-wrap input:focus { border-color: var(--gold); }
.search-wrap input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; }
.header-count { font-size: 11px; color: var(--muted); letter-spacing: 2px; white-space: nowrap; }
.hero { padding: 140px 40px 60px; text-align: center; position: relative; }
.hero::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 1px; height: 100px; background: linear-gradient(to bottom, transparent, var(--gold)); }
.hero-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(36px, 6vw, 72px); font-weight: 300; letter-spacing: 8px; color: var(--text); line-height: 1; margin-bottom: 12px; }
.hero-title span { color: var(--gold); font-style: italic; }
.hero-sub { font-size: 10px; letter-spacing: 6px; color: var(--muted); text-transform: uppercase; }
.playlists-nav { padding: 0 40px 40px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
.pl-pill { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 16px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; white-space: nowrap; }
.pl-pill:hover, .pl-pill.active { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
.tracks-section { padding: 0 40px 200px; max-width: 1200px; margin: 0 auto; }
.section-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.section-title { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 4px; color: var(--gold); }
.section-count { font-size: 11px; color: var(--muted); letter-spacing: 1px; }
.track-list { display: flex; flex-direction: column; gap: 1px; }
.track { display: grid; grid-template-columns: 40px 1fr auto auto; align-items: center; gap: 16px; padding: 14px 16px; background: var(--bg2); cursor: pointer; transition: background 0.15s; border-left: 2px solid transparent; }
.track:hover { background: var(--bg3); border-left-color: var(--border); }
.track.playing { background: var(--bg3); border-left-color: var(--gold); }
.track-num { font-size: 11px; color: var(--muted); text-align: center; font-family: 'Cormorant Garamond', serif; }
.track.playing .track-num { display: none; }
.track-play-icon { display: none; color: var(--gold); font-size: 14px; text-align: center; }
.track.playing .track-play-icon { display: block; }
.track-info { min-width: 0; }
.track-title { font-size: 15px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; font-family: 'Cormorant Garamond', serif; letter-spacing: 0.5px; }
.track.playing .track-title { color: var(--gold); }
.track-playlist { font-size: 10px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.track-duration { font-size: 11px; color: var(--muted); font-family: 'Cormorant Garamond', serif; letter-spacing: 1px; }
.track-dl { background: none; border: 1px solid transparent; color: var(--muted); cursor: pointer; padding: 4px 8px; font-size: 13px; transition: all 0.2s; border-radius: 2px; }
.track-dl:hover { border-color: var(--border); color: var(--gold); }
#player { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.98); backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 16px 40px; z-index: 200; display: none; }
#player.visible { display: block; }
.player-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; gap: 24px; }
.player-info .p-title { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: var(--gold); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-info .p-playlist { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }
.player-controls { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.player-btns { display: flex; align-items: center; gap: 20px; }
.btn-prev, .btn-next { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; transition: color 0.2s; }
.btn-prev:hover, .btn-next:hover { color: var(--text); }
.btn-play { width: 40px; height: 40px; border-radius: 50%; background: var(--gold); border: none; color: #000; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
.btn-play:hover { background: var(--gold-light); }
.progress-wrap { display: flex; align-items: center; gap: 10px; width: 100%; }
.progress-bar { flex: 1; height: 3px; background: #333; border-radius: 2px; cursor: pointer; position: relative; }
.progress-fill { height: 100%; background: var(--gold); border-radius: 2px; width: 0%; transition: width 0.1s linear; pointer-events: none; }
.time { font-size: 10px; color: var(--muted); font-family: 'Cormorant Garamond', serif; letter-spacing: 1px; min-width: 32px; }
.player-actions { display: flex; justify-content: flex-end; gap: 12px; }
.player-dl { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; font-size: 10px; letter-spacing: 2px; cursor: pointer; transition: all 0.2s; text-transform: uppercase; }
.player-dl:hover { border-color: var(--gold); color: var(--gold); }
.loading { text-align: center; padding: 60px; color: var(--muted); font-size: 12px; letter-spacing: 3px; }
.loading-dot { display: inline-block; animation: pulse 1.2s infinite; }
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
.empty { text-align: center; padding: 60px; color: var(--muted); font-size: 12px; letter-spacing: 2px; }
audio { display: none; }
@media (max-width: 768px) {
  header { padding: 0 20px; }
  .search-wrap { margin: 0 16px; }
  .hero { padding: 120px 20px 40px; }
  .playlists-nav { padding: 0 20px 30px; }
  .tracks-section { padding: 0 20px 180px; }
  .player-inner { grid-template-columns: 1fr; gap: 10px; }
  .player-actions { justify-content: center; }
  #player { padding: 12px 20px; }
}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-name">VLADIMIR STREIFF</div>
    <div class="logo-sub">Original Scores Music</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="Rechercher un titre..." oninput="filterTracks()">
  </div>
  <div class="header-count" id="header-count">Chargement...</div>
</header>
<div class="hero">
  <h1 class="hero-title">Original <span>Scores</span> Music</h1>
  <p class="hero-sub">Musique originale pour l'image · Supervision musicale</p>
</div>
<div class="playlists-nav" id="playlists-nav"></div>
<div class="tracks-section">
  <div class="section-header">
    <span class="section-title" id="section-title">CATALOGUE</span>
    <span class="section-count" id="section-count"></span>
  </div>
  <div id="track-list" class="track-list">
    <div class="loading">
      <span class="loading-dot">·</span>
      <span class="loading-dot">·</span>
      <span class="loading-dot">·</span>
      &nbsp; Chargement du catalogue
    </div>
  </div>
</div>
<div id="player">
  <div class="player-inner">
    <div class="player-info">
      <div class="p-title" id="p-title">—</div>
      <div class="p-playlist" id="p-playlist">—</div>
    </div>
    <div class="player-controls">
      <div class="player-btns">
        <button class="btn-prev" onclick="prevTrack()">⏮</button>
        <button class="btn-play" id="btn-play" onclick="togglePlay()">▶</button>
        <button class="btn-next" onclick="nextTrack()">⏭</button>
      </div>
      <div class="progress-wrap">
        <span class="time" id="time-cur">0:00</span>
        <div class="progress-bar" id="progress-bar" onclick="seekTo(event)">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="time" id="time-dur">0:00</span>
      </div>
    </div>
    <div class="player-actions">
      <button class="player-dl" onclick="downloadCurrent()">⬇ Télécharger</button>
    </div>
  </div>
</div>
<audio id="audio"></audio>
<script>
const CLOUD_NAME = 'dqfogw7sg';
let allTracks = [], filteredTracks = [], currentIndex = -1, currentFolder = null;
const audio = document.getElementById('audio');

function cloudUrl(id) {
  return `https://res.cloudinary.com/${CLOUD_NAME}/video/upload/${id}`;
}
function formatDur(s) {
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}
function renderPlaylists() {
  const nav = document.getElementById('playlists-nav');
  nav.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'pl-pill active';
  all.textContent = 'Tout';
  all.onclick = () => selectFolder(null, all);
  nav.appendChild(all);
  [...new Set(allTracks.map(t => t.playlist))].sort().forEach(f => {
    const btn = document.createElement('button');
    btn.className = 'pl-pill';
    btn.textContent = f;
    btn.onclick = () => selectFolder(f, btn);
    nav.appendChild(btn);
  });
}
function selectFolder(folder, btn) {
  currentFolder = folder;
  document.querySelectorAll('.pl-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterTracks();
}
function filterTracks() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  filteredTracks = allTracks.filter(t => {
    const matchFolder = !currentFolder || t.playlist === currentFolder;
    const matchSearch = !q || t.title.toLowerCase().includes(q) || t.playlist.toLowerCase().includes(q);
    return matchFolder && matchSearch;
  });
  renderTracks();
}
function renderTracks() {
  const list = document.getElementById('track-list');
  document.getElementById('section-title').textContent = currentFolder || 'CATALOGUE COMPLET';
  document.getElementById('section-count').textContent = `${filteredTracks.length} morceaux`;
  if (!filteredTracks.length) { list.innerHTML = '<div class="empty">Aucun résultat</div>'; return; }
  list.innerHTML = filteredTracks.map((t, i) => `
    <div class="track${currentIndex === i ? ' playing' : ''}" onclick="playTrack(${i})">
      <div><div class="track-num">${i+1}</div><div class="track-play-icon">▶</div></div>
      <div class="track-info">
        <div class="track-title">${t.title}</div>
        <div class="track-playlist">${t.playlist}</div>
      </div>
      <div class="track-duration">${t.duration||'—'}</div>
      <button class="track-dl" onclick="event.stopPropagation();downloadTrack(${i})">⬇</button>
    </div>`).join('');
}
function playTrack(i) {
  const t = filteredTracks[i];
  if (!t) return;
  currentIndex = i;
  document.getElementById('p-title').textContent = t.title;
  document.getElementById('p-playlist').textContent = t.playlist;
  document.getElementById('player').classList.add('visible');
  audio.src = t.url;
  audio.play();
  document.getElementById('btn-play').textContent = '⏸';
  renderTracks();
}
function togglePlay() {
  if (audio.paused) { audio.play(); document.getElementById('btn-play').textContent = '⏸'; }
  else { audio.pause(); document.getElementById('btn-play').textContent = '▶'; }
}
function prevTrack() { if (currentIndex > 0) playTrack(currentIndex - 1); }
function nextTrack() { if (currentIndex < filteredTracks.length - 1) playTrack(currentIndex + 1); }
audio.addEventListener('ended', nextTrack);
audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('time-cur').textContent = formatDur(audio.currentTime);
  if (audio.duration) document.getElementById('time-dur').textContent = formatDur(audio.duration);
});
function seekTo(e) {
  const bar = document.getElementById('progress-bar');
  const rect = bar.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
}
function downloadTrack(i) {
  const t = filteredTracks[i];
  if (!t) return;
  const a = document.createElement('a');
  a.href = t.url; a.download = t.title + '.mp3'; a.target = '_blank'; a.click();
}
function downloadCurrent() { if (currentIndex >= 0) downloadTrack(currentIndex); }

fetch('./catalogue.json')
  .then(r => r.json())
  .then(data => {
    allTracks = data.tracks.map(t => ({...t, url: t.url || cloudUrl(t.id)}));
    filteredTracks = [...allTracks];
    document.getElementById('header-count').textContent = `${allTracks.length} morceaux`;
    document.getElementById('track-list').innerHTML = '';
    renderPlaylists();
    renderTracks();
  })
  .catch(() => {
    document.getElementById('track-list').innerHTML = '<div class="empty">Erreur de chargement du catalogue.</div>';
    document.getElementById('header-count').textContent = '—';
  });
</script>
</body>
</html>
