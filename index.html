<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Original Scores Music — Catalogue</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }

#loginScreen {
  position: fixed; inset: 0; background: #fff;
  display: flex; align-items: center; justify-content: center; z-index: 999;
}
.login-box {
  background: #fff; border: 1px solid #e0e0e0; border-radius: 16px;
  padding: 40px 32px; width: 90%; max-width: 380px; text-align: center;
}
.login-box h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
.login-box p { font-size: 13px; color: #888; margin-bottom: 24px; }
.login-box input {
  width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 10px;
  font-size: 14px; margin-bottom: 12px; outline: none; text-align: center;
  letter-spacing: 4px; background: #fafafa;
}
.login-box input:focus { border-color: #1a1a1a; }
.login-box button {
  width: 100%; padding: 12px; background: #1a1a1a; color: #fff;
  border: none; border-radius: 10px; font-size: 14px; font-weight: 500; cursor: pointer;
}
.login-box button:hover { background: #333; }
.login-error { font-size: 12px; color: #e24b4a; margin-top: 8px; display: none; }

header {
  background: #fff; border-bottom: 1px solid #e8e8e8;
  padding: 14px 20px; position: sticky; top: 0; z-index: 100;
}
.header-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
.logo-circle {
  width: 38px; height: 38px; border-radius: 50%; background: #1a1a1a;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 15px; font-weight: 700; flex-shrink: 0;
}
.header-text h1 { font-size: 16px; font-weight: 600; }
.header-text p { font-size: 11px; color: #999; }

.container { max-width: 900px; margin: 0 auto; padding: 16px 12px 200px; }

.filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.filters input, .filters select {
  padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 10px;
  background: #fff; color: #1a1a1a; font-size: 13px; outline: none;
}
.filters input { flex: 1; min-width: 180px; }
.filters input:focus, .filters select:focus { border-color: #1a1a1a; }

.stats { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.stat {
  background: #fff; border: 1px solid #e8e8e8; border-radius: 8px;
  padding: 6px 14px; font-size: 12px; color: #888;
}
.stat span { color: #1a1a1a; font-weight: 600; }

.track-list { display: flex; flex-direction: column; gap: 6px; }

.track {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; background: #fff; border: 1px solid #e8e8e8;
  border-radius: 12px; cursor: pointer; transition: all 0.15s;
}
.track:hover { border-color: #ccc; }
.track.active { border-color: #1a1a1a; background: #fafafa; }

.play-btn {
  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;
  background: #f0f0f0; border: 1px solid #e0e0e0;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; color: #555;
}
.track.active .play-btn { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

.track-info { flex: 1; min-width: 0; }
.track-title {
  font-size: 13px; font-weight: 500; color: #1a1a1a;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px;
}
.track-meta { display: flex; flex-wrap: wrap; gap: 4px; }
.tag {
  display: inline-block; padding: 2px 9px; border-radius: 20px;
  font-size: 11px; border: 1px solid #e8e8e8; background: #f5f5f5; color: #666;
}
.tag.playlist { background: #f0f4ff; color: #3366cc; border-color: #d0deff; }
.tag.format { background: #f0faf4; color: #2d7a50; border-color: #c0e8d0; }

.dl-btn {
  font-size: 12px; padding: 7px 13px; border: 1px solid #e0e0e0;
  border-radius: 8px; background: #fff; color: #555;
  cursor: pointer; flex-shrink: 0; text-decoration: none; white-space: nowrap;
}
.dl-btn:hover { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

/* PLAYER BAR avec iframe */
.player-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff; border-top: 1px solid #e8e8e8;
  padding: 10px 16px; display: none; z-index: 100;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
}
.player-inner { max-width: 900px; margin: 0 auto; }
.player-title { font-size: 12px; color: #888; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.player-title strong { color: #1a1a1a; }
#playerIframe { width: 100%; height: 80px; border: none; border-radius: 8px; }

.loading, .empty {
  text-align: center; padding: 3rem; color: #aaa; font-size: 14px;
  background: #fff; border-radius: 12px; border: 1px solid #e8e8e8;
}
.limit-note { text-align: center; padding: 12px; color: #bbb; font-size: 12px; }

@media (max-width: 600px) {
  .container { padding: 12px 10px 200px; }
  .filters input, .filters select { font-size: 16px; }
  .track { padding: 10px 10px; gap: 8px; }
  .dl-btn { padding: 6px 9px; font-size: 11px; }
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div style="width:52px;height:52px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;font-weight:700;margin:0 auto 16px;">O</div>
    <h1>Original Scores Music</h1>
    <p>Catalogue professionnel — Accès réservé</p>
    <input type="password" id="passwordInput" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')checkPassword()"/>
    <button onclick="checkPassword()">Accéder au catalogue</button>
    <div class="login-error" id="loginError">Mot de passe incorrect</div>
  </div>
</div>

<header>
  <div class="header-inner">
    <div class="logo-circle">O</div>
    <div class="header-text">
      <h1>Original Scores Music</h1>
      <p>Catalogue musical — Monteurs &amp; Réalisateurs</p>
    </div>
  </div>
</header>

<div class="container">
  <div class="filters">
    <input type="text" id="search" placeholder="Rechercher un titre, tag, ambiance..." oninput="filterTracks()"/>
    <select id="filterPlaylist" onchange="filterTracks()"><option value="">Toutes les playlists</option></select>
    <select id="filterFormat" onchange="filterTracks()"><option value="">Tous les formats</option></select>
  </div>
  <div class="stats">
    <div class="stat">Total : <span id="totalCount">—</span> morceaux</div>
    <div class="stat">Affichés : <span id="visibleCount">—</span></div>
    <div class="stat">Playlists : <span id="playlistCount">—</span></div>
  </div>
  <div class="track-list" id="trackList">
    <div class="loading">Chargement du catalogue...</div>
  </div>
</div>

<div class="player-bar" id="playerBar">
  <div class="player-inner">
    <div class="player-title">En lecture : <strong id="playerTitle">—</strong></div>
    <iframe id="playerIframe" src="" allow="autoplay"></iframe>
  </div>
</div>

<script>
const PASSWORD = "osm2026";
const SHEET_ID = "1If8xgv6Ua8kh6N_nZuML06yhxr_dtMPyPpTn9tikx9s";
const API_URL = "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:json";

let allTracks = [];
let currentUrl = null;

function checkPassword() {
  if (document.getElementById("passwordInput").value === PASSWORD) {
    document.getElementById("loginScreen").style.display = "none";
    loadCatalogue();
  } else {
    document.getElementById("loginError").style.display = "block";
    document.getElementById("passwordInput").value = "";
  }
}

async function loadCatalogue() {
  try {
    const res = await fetch(API_URL);
    const text = await res.text();
    const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);

    allTracks = json.table.rows.map(row => {
      const v = row.c.map(c => c ? String(c.v !== undefined && c.v !== null ? c.v : (c.f || "")).trim() : "");
      return { titre: v[0], playlist: v[1]||"Divers", format: v[2], tags: v[3], lienEcoute: v[4], lienDl: v[5] };
    }).filter(t => t.titre && t.titre !== "Titre" && t.titre !== "undefined");

    const playlists = [...new Set(allTracks.map(t => t.playlist))].sort();
    const formats = [...new Set(allTracks.map(t => t.format))].filter(Boolean).sort();
    const pSel = document.getElementById("filterPlaylist");
    const fSel = document.getElementById("filterFormat");
    playlists.forEach(p => { const o = document.createElement("option"); o.value = p; o.textContent = p; pSel.appendChild(o); });
    formats.forEach(f => { const o = document.createElement("option"); o.value = f; o.textContent = f; fSel.appendChild(o); });

    document.getElementById("totalCount").textContent = allTracks.length;
    document.getElementById("playlistCount").textContent = playlists.length;
    filterTracks();
  } catch(e) {
    document.getElementById("trackList").innerHTML = '<div class="loading">Erreur de chargement.</div>';
  }
}

function filterTracks() {
  const q = document.getElementById("search").value.toLowerCase();
  const pl = document.getElementById("filterPlaylist").value;
  const fmt = document.getElementById("filterFormat").value;
  const filtered = allTracks.filter(t =>
    (!q || t.titre.toLowerCase().includes(q) || t.tags.toLowerCase().includes(q) || t.playlist.toLowerCase().includes(q)) &&
    (!pl || t.playlist === pl) && (!fmt || t.format === fmt)
  );
  document.getElementById("visibleCount").textContent = filtered.length;
  renderTracks(filtered);
}

function renderTracks(tracks) {
  const list = document.getElementById("trackList");
  if (!tracks.length) { list.innerHTML = '<div class="empty">Aucun morceau trouvé.</div>'; return; }
  list.innerHTML = "";
  tracks.slice(0, 300).forEach(t => {
    const div = document.createElement("div");
    div.className = "track" + (currentUrl === t.lienEcoute ? " active" : "");

    const btn = document.createElement("div");
    btn.className = "play-btn";
    btn.textContent = currentUrl === t.lienEcoute ? "▶" : "▷";

    const info = document.createElement("div");
    info.className = "track-info";

    const titleEl = document.createElement("div");
    titleEl.className = "track-title";
    titleEl.textContent = t.titre;

    const meta = document.createElement("div");
    meta.className = "track-meta";

    [{ text: t.playlist, cls: "tag playlist" }, { text: t.format, cls: "tag format" }].forEach(({ text, cls }) => {
      if (!text) return;
      const s = document.createElement("span");
      s.className = cls; s.textContent = text; meta.appendChild(s);
    });

    if (t.tags) t.tags.split(",").forEach(tg => {
      if (!tg.trim()) return;
      const s = document.createElement("span");
      s.className = "tag"; s.textContent = tg.trim(); meta.appendChild(s);
    });

    info.appendChild(titleEl);
    info.appendChild(meta);
    div.appendChild(btn);
    div.appendChild(info);

    if (t.lienDl) {
      const dl = document.createElement("a");
      dl.className = "dl-btn"; dl.href = t.lienDl; dl.target = "_blank";
      dl.textContent = "⬇ DL"; dl.onclick = e => e.stopPropagation();
      div.appendChild(dl);
    }

    div.onclick = () => {
      currentUrl = t.lienEcoute;
      document.querySelectorAll(".track").forEach(tr => { tr.classList.remove("active"); tr.querySelector(".play-btn").textContent = "▷"; });
      div.classList.add("active"); btn.textContent = "▶";
      document.getElementById("playerTitle").textContent = t.titre + " — " + t.playlist;

      // Extraire l'ID du fichier et utiliser l'iframe Google Drive preview
      const m = t.lienEcoute.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      const fileId = m ? m[1] : "";
      const previewUrl = "https://drive.google.com/file/d/" + fileId + "/preview";
      document.getElementById("playerIframe").src = previewUrl;
      document.getElementById("playerBar").style.display = "block";
    };

    list.appendChild(div);
  });

  if (tracks.length > 300) {
    const note = document.createElement("div");
    note.className = "limit-note";
    note.textContent = "Affichage limité à 300 résultats — affinez votre recherche.";
    list.appendChild(note);
  }
}

document.getElementById("passwordInput").focus();
</script>
</body>
</html>
