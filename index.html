<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OSM – Original Scores Music</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #E50914;
  --bg: #242424;
  --bg2: #2e2e2e;
  --bg3: #393939;
  --bg4: #454545;
  --text: #ffffff;
  --text2: #e8e8e8;
  --muted: #bbb;
  --border: rgba(255,255,255,0.18);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; min-height: 100vh; overflow-x: hidden; }

header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(14,14,14,0.97); backdrop-filter: blur(10px);
  padding: 0 48px; height: 68px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 12px; }
.logo-mark { background: var(--red); color: #fff; font-size: 12px; font-weight: 700; letter-spacing: 2px; padding: 5px 9px; border-radius: 3px; }
.logo-name { font-size: 14px; font-weight: 600; letter-spacing: 2px; color: var(--text); }
.header-right { display: flex; align-items: center; gap: 16px; }

.search-wrap { position: relative; width: 320px; }
.search-wrap input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 4px; padding: 9px 16px 9px 36px;
  color: var(--text); font-family: 'Montserrat', sans-serif; font-size: 13px;
  outline: none; transition: border-color 0.2s, background 0.2s;
}
.search-wrap input:focus { border-color: #555; background: var(--bg4); }
.search-wrap input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }

.search-suggestions {
  position: absolute; top: 100%; left: 0; right: 0;
  background: var(--bg3); border: 1px solid var(--border);
  border-top: none; border-radius: 0 0 4px 4px;
  max-height: 220px; overflow-y: auto; z-index: 200;
  display: none;
}
.search-suggestions.visible { display: block; }
.suggestion {
  padding: 10px 16px; font-size: 12px; cursor: pointer;
  color: var(--text2); transition: background 0.1s;
  display: flex; align-items: center; gap: 8px;
}
.suggestion:hover { background: var(--bg4); color: var(--text); }
.suggestion-type { font-size: 10px; color: var(--muted); background: var(--bg4); padding: 2px 6px; border-radius: 2px; }

.btn-contact {
  background: var(--red); color: #fff; border: none;
  padding: 9px 16px; font-family: 'Montserrat', sans-serif;
  font-size: 12px; font-weight: 600; letter-spacing: 1px;
  cursor: pointer; border-radius: 4px; white-space: nowrap;
  transition: background 0.15s; text-decoration: none;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-contact:hover { background: #c4070f; }
.btn-phone {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text2);
  padding: 9px 16px; font-family: 'Montserrat', sans-serif;
  font-size: 12px; font-weight: 500; cursor: pointer; border-radius: 4px;
  white-space: nowrap; transition: all 0.15s; text-decoration: none;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn-phone:hover { border-color: #555; color: var(--text); }
.header-count { font-size: 11px; color: var(--muted); white-space: nowrap; }

.hero {
  padding: 110px 48px 40px;
  background: linear-gradient(180deg, #0a0a0a 0%, var(--bg) 100%);
}
.hero-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 4px; color: var(--red); text-transform: uppercase; margin-bottom: 14px; }
.hero-title { font-size: clamp(28px, 4vw, 52px); font-weight: 700; letter-spacing: -0.5px; line-height: 1.1; margin-bottom: 10px; }
.hero-title span { color: var(--red); }
.hero-sub { font-size: 14px; font-weight: 300; color: var(--text2); letter-spacing: 0.5px; }

.playlists-nav { padding: 28px 48px 0; display: flex; flex-wrap: wrap; gap: 8px; }
.pl-pill {
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--text2); padding: 8px 18px;
  font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.15s;
  font-family: 'Montserrat', sans-serif; border-radius: 20px; white-space: nowrap;
}
.pl-pill:hover { background: var(--bg4); color: var(--text); border-color: #555; }
.pl-pill.active { background: var(--red); color: #fff; border-color: var(--red); }

/* Tags sous les playlists */
.playlist-tags {
  padding: 12px 48px 0;
  display: flex; flex-wrap: wrap; gap: 6px;
  min-height: 0; overflow: hidden;
  transition: all 0.2s;
}
.tag-pill {
  background: transparent; border: 1px solid rgba(255,255,255,0.06);
  color: var(--muted); padding: 4px 12px;
  font-size: 11px; font-weight: 400;
  cursor: pointer; transition: all 0.15s;
  font-family: 'Montserrat', sans-serif; border-radius: 12px; white-space: nowrap;
}
.tag-pill:hover { border-color: var(--red); color: var(--red); }
.tag-pill.active { background: rgba(229,9,20,0.15); border-color: var(--red); color: #ff6b6b; }

.tracks-section { padding: 24px 48px 200px; }
.section-header {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 16px; padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.section-title { font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
.section-count { font-size: 12px; color: var(--muted); }
.section-tag { font-size: 11px; color: var(--red); background: rgba(229,9,20,0.1); padding: 3px 10px; border-radius: 10px; }

.tracks-header {
  display: grid; grid-template-columns: 52px 1fr 180px 60px 44px;
  gap: 16px; padding: 6px 16px;
  font-size: 10px; font-weight: 600; letter-spacing: 2px;
  color: var(--muted); text-transform: uppercase;
  border-bottom: 1px solid var(--border); margin-bottom: 2px;
}
.track-list { display: flex; flex-direction: column; }
.track {
  display: grid; grid-template-columns: 52px 1fr 180px 60px 44px;
  align-items: center; gap: 16px;
  padding: 13px 16px; cursor: pointer;
  transition: background 0.1s; border-radius: 4px;
}
.track:hover { background: var(--bg2); }
.track.playing { background: var(--bg3); }
.track-num { font-size: 14px; color: var(--muted); text-align: center; font-weight: 400; }
.track.playing .track-num { display: none; }
.track-play-icon { display: none; color: var(--red); font-size: 16px; text-align: center; }
.track.playing .track-play-icon { display: block; }
.track-info { min-width: 0; }
.track-title { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.track.playing .track-title { color: var(--red); }
.track-artist { font-size: 12px; color: var(--text2); font-weight: 400; }
.track-badge {
  display: inline-block; font-size: 11px; font-weight: 500;
  color: var(--text2); background: var(--bg3);
  padding: 4px 10px; border-radius: 12px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%;
}
.track.playing .track-badge { background: rgba(229,9,20,0.15); color: #ff6b6b; }
.track-duration { font-size: 13px; color: var(--muted); font-weight: 400; text-align: right; }
.track-dl {
  background: none; border: 1px solid transparent; color: var(--muted);
  cursor: pointer; width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; transition: all 0.15s; border-radius: 4px;
}
.track-dl:hover { border-color: var(--border); color: var(--text); background: var(--bg3); }

#player {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #0d0d0d; border-top: 1px solid var(--border);
  padding: 0 48px; height: 82px; z-index: 200;
  display: none; align-items: center;
}
#player.visible { display: flex; }
.player-inner { width: 100%; display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center; gap: 24px; }
.player-info { min-width: 0; }
.p-title { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.p-playlist { font-size: 11px; font-weight: 400; color: var(--text2); letter-spacing: 1px; }
.player-controls { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.player-btns { display: flex; align-items: center; gap: 28px; }
.btn-prev, .btn-next { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 20px; transition: color 0.15s; }
.btn-prev:hover, .btn-next:hover { color: var(--text); }
.btn-play { width: 38px; height: 38px; border-radius: 50%; background: var(--text); border: none; color: #000; font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
.btn-play:hover { transform: scale(1.06); }
.progress-wrap { display: flex; align-items: center; gap: 12px; width: 100%; }
.progress-bar { flex: 1; height: 4px; background: var(--bg4); border-radius: 2px; cursor: pointer; }
.progress-bar:hover .progress-fill { background: var(--red); }
.progress-fill { height: 100%; background: var(--text2); border-radius: 2px; width: 0%; transition: width 0.1s linear; pointer-events: none; }
.time { font-size: 11px; color: var(--muted); min-width: 38px; }
.time:last-child { text-align: right; }
.player-actions { display: flex; justify-content: flex-end; }
.player-dl { background: none; border: 1px solid var(--border); color: var(--text2); padding: 8px 18px; font-size: 11px; font-weight: 600; letter-spacing: 1.5px; cursor: pointer; transition: all 0.15s; text-transform: uppercase; font-family: 'Montserrat', sans-serif; border-radius: 4px; }
.player-dl:hover { border-color: #666; color: var(--text); }

.loading { text-align: center; padding: 80px; color: var(--muted); font-size: 13px; letter-spacing: 2px; }
.loading-dot { display: inline-block; animation: pulse 1.2s infinite; }
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }
.empty { text-align: center; padding: 80px; color: var(--muted); font-size: 13px; letter-spacing: 2px; }
audio { display: none; }

@media (max-width: 900px) {
  header { padding: 0 20px; }
  .header-count { display: none; }
  .hero { padding: 100px 20px 32px; }
  .playlists-nav, .playlist-tags { padding-left: 20px; padding-right: 20px; }
  .tracks-section { padding: 20px 20px 160px; }
  .tracks-header { display: none; }
  .track { grid-template-columns: 40px 1fr auto 36px; }
  .track-badge, .track-duration { display: none; }
  #player { padding: 0 20px; height: 70px; }
  .player-inner { grid-template-columns: 1fr auto; gap: 12px; }
  .player-info { display: none; }
  .player-actions { display: none; }
  .search-wrap { width: 160px; }
  .btn-phone { display: none; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">OSM</div>
    <div class="logo-name">Vladimir Streiff</div>
  </div>
  <div class="header-right">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Rechercher un titre..." oninput="onSearch()" onfocus="showSuggestions()" onblur="setTimeout(hideSuggestions,200)">
      <div class="search-suggestions" id="suggestions"></div>
    </div>
    <div class="header-count" id="header-count">Chargement...</div>
    <a class="btn-phone" href="tel:+33682985752">📞 06 82 98 57 52</a>
    <a class="btn-contact" href="/cdn-cgi/l/email-protection#d1a7bdb0b5b8bcb8a3a2a5a3b4b8b7b791b6bcb0b8bdffb2bebc">✉ Email</a>
  </div>
</header>

<div class="hero">
  <div class="hero-eyebrow">Supervision Musicale</div>
  <h1 class="hero-title">Original <span>Scores</span> Music</h1>
  <p class="hero-sub">Musique originale pour l'image &nbsp;·&nbsp; Cinéma &nbsp;·&nbsp; Télévision &nbsp;·&nbsp; Publicité</p>
</div>

<div class="playlists-nav" id="playlists-nav"></div>
<div class="playlist-tags" id="playlist-tags"></div>

<div class="tracks-section">
  <div class="section-header">
    <span class="section-title" id="section-title">Catalogue</span>
    <span class="section-count" id="section-count"></span>
    <span class="section-tag" id="section-tag" style="display:none"></span>
  </div>
  <div class="tracks-header">
    <span>#</span><span>Titre</span><span>Playlist</span><span>Durée</span><span></span>
  </div>
  <div id="track-list" class="track-list">
    <div class="loading">
      <span class="loading-dot">·</span>
      <span class="loading-dot">·</span>
      <span class="loading-dot">·</span>
      &nbsp; Chargement du catalogue
    </div>
  </div>
</div>

<div id="player">
  <div class="player-inner">
    <div class="player-info">
      <div class="p-title" id="p-title">—</div>
      <div class="p-playlist" id="p-playlist">—</div>
    </div>
    <div class="player-controls">
      <div class="player-btns">
        <button class="btn-prev" onclick="prevTrack()">⏮</button>
        <button class="btn-play" id="btn-play" onclick="togglePlay()">▶</button>
        <button class="btn-next" onclick="nextTrack()">⏭</button>
      </div>
      <div class="progress-wrap">
        <span class="time" id="time-cur">0:00</span>
        <div class="progress-bar" id="progress-bar" onclick="seekTo(event)">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="time" id="time-dur">0:00</span>
      </div>
    </div>
    <div class="player-actions">
      <button class="player-dl" onclick="downloadCurrent()">⬇ Télécharger</button>
    </div>
  </div>
</div>

<audio id="audio"></audio>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
const PLAYLIST_TAGS = {
  "Action": ["poursuite","combat","sport","intense","urgent","rapide","adrénaline","action"],
  "Atmosphère": ["espace","aérien","cosmique","ambient","planant","contemplatif","atmosphère"],
  "Burlesque": ["humour","comique","drôle","léger","théâtral","décalé","burlesque"],
  "Country Blues": ["guitare","americana","folk","blues","roots","usa","country"],
  "Électro": ["électronique","beat","club","dj","synthé","moderne","électro"],
  "Électro-Pop": ["pop","urbain","corporate","énergique","arty","actuel","électro-pop"],
  "Folk Acoustique": ["acoustique","guitare","naturel","doux","relax","harmonie","folk"],
  "Groovy": ["funk","disco","rythmique","dansant","vivant","groove","groovy"],
  "Hard Rock": ["metal","guitare électrique","rage","puissant","agressif","hard rock"],
  "Latino": ["mexique","amérique du sud","chaleureux","festif","western","latino"],
  "Loops": ["boucle","bpm","répétitif","adaptatif","métronome","loop"],
  "Ludique": ["enfant","cartoon","amusant","drôle","léger","animation","ludique"],
  "Neutre Positif": ["happy","optimiste","positif","neutre","léger","neutre positif"],
  "Mélancolie": ["triste","mélancolique","émotion","nostalgique","doux","mélancolie"],
  "Orchestral": ["épique","symphonique","héroïque","cinéma","grandiose","orchestral"],
  "Paname": ["paris","accordéon","rétro","café","montmartre","français","paname"],
  "Paranormal": ["mystère","hypnotique","expérimental","étrange","sombre","paranormal"],
  "Piano": ["classique","intimiste","calme","solo","doux","poétique","piano"],
  "Pizzicato": ["cartoon","animation","bétisier","comique","léger","pizzicato"],
  "Pop Acoustique": ["ballade","doux","chaleureux","route","voyage","actuel","pop"],
  "Reggae": ["jamaica","ska","fusion","décontracté","soleil","reggae"],
  "Rock": ["guitare","garage","live","électrique","riffs","énergique","rock"],
  "Romance": ["amour","nostalgie","drame","émotion","romantique","romance"],
  "Suspense": ["enquête","angoisse","espionnage","policier","tension","suspense"],
  "Swing Jazz": ["jazz","big band","manouche","rythme","festif","vintage","swing"],
  "Transition": ["jingle","virgule","rise","whoosh","ponctuation","court","transition"],
  "Urban": ["hip-hop","rap","r&b","street","beat","moderne","urban"],
  "World Music": ["ethnique","traditionnel","métissage","culture","monde","world"]
};

let allTracks = [], filteredTracks = [], currentIndex = -1, currentFolder = null, activeTag = null;
const audio = document.getElementById('audio');

function formatDur(s) {
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function renderPlaylists() {
  const nav = document.getElementById('playlists-nav');
  nav.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'pl-pill active';
  all.textContent = 'Tout';
  all.onclick = () => selectFolder(null, all);
  nav.appendChild(all);
  [...new Set(allTracks.map(t => t.playlist))]
    .filter(p => p !== 'Divers' && p !== 'samples')
    .sort()
    .forEach(f => {
      const btn = document.createElement('button');
      btn.className = 'pl-pill';
      btn.textContent = f;
      btn.onclick = () => selectFolder(f, btn);
      nav.appendChild(btn);
    });
}

function renderTags() {
  const container = document.getElementById('playlist-tags');
  container.innerHTML = '';
  const playlist = currentFolder;
  if (!playlist || !PLAYLIST_TAGS[playlist]) return;
  PLAYLIST_TAGS[playlist].forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag-pill' + (activeTag === tag ? ' active' : '');
    btn.textContent = tag;
    btn.onclick = () => selectTag(tag, btn);
    container.appendChild(btn);
  });
}

function selectTag(tag, btn) {
  if (activeTag === tag) {
    activeTag = null;
    document.querySelectorAll('.tag-pill').forEach(b => b.classList.remove('active'));
  } else {
    activeTag = tag;
    document.querySelectorAll('.tag-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  filterTracks();
}

function selectFolder(folder, btn) {
  currentFolder = folder;
  activeTag = null;
  currentIndex = -1;
  document.querySelectorAll('.pl-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTags();
  filterTracks();
}

function onSearch() {
  activeTag = null;
  document.querySelectorAll('.tag-pill').forEach(b => b.classList.remove('active'));
  filterTracks();
  showSuggestions();
}

function showSuggestions() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const box = document.getElementById('suggestions');
  if (!q || q.length < 2) { box.classList.remove('visible'); return; }

  const results = [];
  // Chercher dans les playlists et leurs tags
  Object.entries(PLAYLIST_TAGS).forEach(([playlist, tags]) => {
    if (playlist.toLowerCase().includes(q)) {
      results.push({ label: playlist, type: 'Playlist', action: () => { selectFolderByName(playlist); } });
    }
    tags.forEach(tag => {
      if (tag.toLowerCase().includes(q) && results.length < 8) {
        results.push({ label: tag, type: playlist, action: () => { selectFolderByName(playlist); setTimeout(() => selectTagByName(tag), 50); } });
      }
    });
  });

  if (!results.length) { box.classList.remove('visible'); return; }

  box.innerHTML = results.slice(0, 8).map((r, i) => `
    <div class="suggestion" data-i="${i}">
      <span>${r.label}</span>
      <span class="suggestion-type">${r.type}</span>
    </div>`).join('');

  box.querySelectorAll('.suggestion').forEach((el, i) => {
    el.addEventListener('mousedown', () => { results[i].action(); box.classList.remove('visible'); });
  });
  box.classList.add('visible');
}

function hideSuggestions() {
  document.getElementById('suggestions').classList.remove('visible');
}

function selectFolderByName(name) {
  currentFolder = name;
  activeTag = null;
  document.querySelectorAll('.pl-pill').forEach(b => {
    if (b.textContent === name) { b.classList.add('active'); }
    else { b.classList.remove('active'); }
  });
  renderTags();
  filterTracks();
}

function selectTagByName(tag) {
  activeTag = tag;
  document.querySelectorAll('.tag-pill').forEach(b => {
    if (b.textContent === tag) b.classList.add('active');
    else b.classList.remove('active');
  });
  filterTracks();
}

function filterTracks() {
  const q = document.getElementById('search').value.toLowerCase().trim();

  filteredTracks = allTracks.filter(t => {
    if (t.playlist === 'samples') return false;

    const matchFolder = !currentFolder || t.playlist === currentFolder;

    // Si un tag est actif, filtrer par playlist du tag
    const tagPlaylists = activeTag ? Object.entries(PLAYLIST_TAGS)
      .filter(([p, tags]) => tags.includes(activeTag))
      .map(([p]) => p) : null;
    const matchTag = !activeTag || (tagPlaylists && tagPlaylists.includes(t.playlist));

    // Recherche textuelle : titre + playlist + tags de la playlist
    let matchSearch = true;
    if (q) {
      const playlistTags = (PLAYLIST_TAGS[t.playlist] || []).join(' ');
      const haystack = `${t.title} ${t.playlist} ${playlistTags}`.toLowerCase();
      matchSearch = haystack.includes(q);
    }

    return matchFolder && matchTag && matchSearch;
  });

  // Section tag label
  const tagEl = document.getElementById('section-tag');
  if (activeTag) { tagEl.textContent = activeTag; tagEl.style.display = 'inline'; }
  else { tagEl.style.display = 'none'; }

  renderTracks();
}

function renderTracks() {
  const list = document.getElementById('track-list');
  document.getElementById('section-title').textContent = currentFolder || 'Catalogue Complet';
  document.getElementById('section-count').textContent = `${filteredTracks.length} morceaux`;
  if (!filteredTracks.length) {
    list.innerHTML = '<div class="empty">Aucun résultat</div>';
    return;
  }
  list.innerHTML = filteredTracks.map((t, i) => `
    <div class="track${currentIndex === i ? ' playing' : ''}" onclick="playTrack(${i})">
      <div>
        <div class="track-num">${i+1}</div>

function playTrack(i) {
  const t = filteredTracks[i];
  if (!t) return;
  currentIndex = i;
  document.getElementById('p-title').textContent = t.title;
  document.getElementById('p-playlist').textContent = t.playlist;
  document.getElementById('player').classList.add('visible');
  audio.src = t.url;
  audio.play();
  document.getElementById('btn-play').textContent = '⏸';
  renderTracks();
}

function togglePlay() {
  if (audio.paused) { audio.play(); document.getElementById('btn-play').textContent = '⏸'; }
  else { audio.pause(); document.getElementById('btn-play').textContent = '▶'; }
}
function prevTrack() { if (currentIndex > 0) playTrack(currentIndex - 1); }
function nextTrack() { if (currentIndex < filteredTracks.length - 1) playTrack(currentIndex + 1); }
audio.addEventListener('ended', nextTrack);
audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('time-cur').textContent = formatDur(audio.currentTime);
  if (audio.duration) document.getElementById('time-dur').textContent = formatDur(audio.duration);
});
function seekTo(e) {
  const bar = document.getElementById('progress-bar');
  const rect = bar.getBoundingClientRect();
  if (audio.duration) audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
}
function downloadTrack(i) {
  const t = filteredTracks[i];
  if (!t) return;
  const a = document.createElement('a');
  a.href = t.url; a.download = t.title + '.mp3'; a.target = '_blank'; a.click();
}
function downloadCurrent() { if (currentIndex >= 0) downloadTrack(currentIndex); }
